<header class="hospital-header shadow-sm mb-5">
  <div class="container d-flex align-items-center py-3">
    <div class="logo-icon me-3">
      <span class="fs-1 text-danger"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Umbrella_Corporation_logo.svg/960px-Umbrella_Corporation_logo.svg.png"  height="50px" width="50px" alt="logo"></span>
    </div>
    <div>
      <h1 class="h3 mb-0 fw-bold text-white">Umbrella <span class="text-danger">Corporation</span></h1>
      <p class="mb-0 text-secondary small text-uppercase tracking-wider">Sistema Emergenza Sanitaria Avanzata</p>
    </div>
  </div>
</header>

<main class="container">
  <div class="login-container shadow-2xl rounded-4 overflow-hidden mx-auto">
    <div class="login-accent"></div> <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="p-5 bg-dark-card text-white">
      <div class="text-center mb-4">
        <h3 class="fs-2 fw-bold" id="titoloLogin">Area Riservata</h3>
        <p class="text-secondary">Autenticazione richiesta per l'accesso ai dati.</p>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold text-danger small">EMAIL ISTITUZIONALE</label>
        <div class="input-group">
          <span class="input-group-text bg-dark-input text-danger border-secondary"></span>
          <input type="email" 
                 formControlName="email" 
                 class="form-control bg-dark-input text-white border-secondary"
                 placeholder="operatore@ospedale.it"
                 [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
        </div>
        
        @if(form.get('email')?.invalid && form.get('email')?.touched){
          <div class="text-danger mt-1">
            <small class="fw-bold">Formato email non valido</small>
          </div>
        }
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold text-danger small">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-dark-input text-danger border-secondary"></span>
          <input type="password" 
                 formControlName="password" 
                 class="form-control bg-dark-input text-white border-secondary"
                 placeholder="••••••••"
                 [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
        </div>
      </div>

      <div class="mt-4 p-3 bg-dark-input rounded-3 border border-secondary">
        <label class="fw-bold text-danger mb-2 d-block small">RUOLO OPERATIVO</label>
        <div class="d-flex justify-content-around">
          @for(t of tipologie; track t){
            <div class="form-check">
              <input type="radio" 
                     [value]="t" 
                     formControlName="tipologia" 
                     class="form-check-input"
                     [id]="'radio-' + t">
              <label class="form-check-label text-capitalize text-white" [for]="'radio-' + t">{{ t }}</label>
            </div>
          }
        </div>
      </div>

      <button type="submit" class="btn btn-danger btn-lg w-100 mt-4 shadow-sm fw-bold text-uppercase">
        Accedi al Sistema
      </button>

      @if (errorMessage) {
      <div class="error-banner mt-3 p-2 rounded border border-danger bg-danger bg-opacity-10 text-center">
        <small class="fw-bold text-danger">
          ⚠️ {{ errorMessage }}
        </small>
      </div>
      }
      
      
    </form>
  </div>
</main>
