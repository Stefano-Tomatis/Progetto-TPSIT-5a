
<p>User works!</p>

<div class="booking-container">
  <h2 class="title">Gestione Visite Paziente</h2>

  <div class="grid-layout">
    <section class="card-section">
      <div class="card booking-card">
        <div class="card-header bg-success">
          <h3>Nuova Prenotazione</h3>
        </div>
        <div class="card-body">
          <form #prenotaForm="ngForm" (ngSubmit)="onSubmit(prenotaForm)">
            
            <div class="form-group">
              <label>Specialista</label>
              <select class="form-select" name="dottore" 
                      [(ngModel)]="nuovaPrenotazione.dottoreId" 
                      (change)="controllaDisponibilita()" required #doc="ngModel">
                <option value="" disabled selected>Scegli un dottore...</option>
                @for(d of dottori; track d.id) {
                  <option [value]="d.id">{{ d.nome }} - {{ d.specializzazione }}</option>
                }
              </select>
            </div>

            <div class="form-group">
              <label>Data Visita</label>
              <input type="date" class="form-control" name="data" 
                     [(ngModel)]="nuovaPrenotazione.data" 
                     (change)="controllaDisponibilita()" required #data="ngModel">
            </div>

            <div class="form-group">
              <label>Orario Disponibile (09:00 - 17:00)</label>
              <select class="form-select" name="ora" 
                      [(ngModel)]="nuovaPrenotazione.ora" 
                      [disabled]="!nuovaPrenotazione.dottoreId || !nuovaPrenotazione.data"
                      required #ora="ngModel">
                <option value="" disabled selected>Seleziona orario...</option>
                @for(slot of orariSlot; track slot.ora) {
                  <option [value]="slot.ora" [disabled]="slot.occupato">
                    {{ slot.ora }} {{ slot.occupato ? '(Occupato)' : '' }}
                  </option>
                }
              </select>
              @if(!nuovaPrenotazione.data && !ora.disabled) {
                <small class="hint">Seleziona prima dottore e data</small>
              }
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="prenotaForm.invalid">
              Conferma Appuntamento
            </button>
          </form>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="card list-card">
        <div class="card-header bg-info">
          <h3>Le Tue Prenotazioni</h3>
        </div>
        <div class="card-body p-0">
          <table class="table">
            <thead>
              <tr>
                <th>Data/Ora</th>
                <th>Dottore</th>
                <th class="text-end">Azione</th>
              </tr>
            </thead>
            <tbody>
              @for(v of visitePrenotate; track v.id) {
                <tr>
                  <td><strong>{{ v.data }}</strong> alle {{ v.ora }}</td>
                  <td>{{ v.dottore }}</td>
                  <td class="text-end">
                    <button class="btn-outline-danger" (click)="disdiciVisita(v.id)">Disdici</button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>
