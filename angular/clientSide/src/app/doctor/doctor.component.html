<div class="container mt-4">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button (click)="eventoSettimanaScorsa()" class="btn btn-outline-primary">&laquo; Settimana Precedente</button>
    
    <h2 class="h4">Agenda Settimanale</h2>
    
    <button (click)="eventoSettimanaProssima()" class="btn btn-outline-primary">Settimana Successiva &raquo;</button>
  </div>

  <div class="row g-2">
    
    @for (giornoVisite of settimanaLavorativa; track $index) {
      <div class="col">
        <div class="card h-100">
          <div class="card-header bg-primary text-white text-center">
            <strong>{{ ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì'][$index] }}</strong>
          </div>
          
          <div class="card-body p-2">
            
            @for (visita of giornoVisite; track visita.id) {
              <div class="alert alert-info p-2 mb-1 small">
                {{ visita.DataOrario | date:'HH:mm' }} - {{ visita.paziente }}
              </div>
            } @empty {
              <p class="text-muted small text-center">Nessuna visita</p>
            }

          </div>
        </div>
      </div>
    }

  </div>
</div>
